services:
  - type: web
    name: nurtura-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISABLE_EMBEDDED_PG
        value: true
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RAG_TOP_K
        value: 4
      - key: RAG_MIN_SCORE
        value: 0.32
